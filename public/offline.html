<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>غير متصل — حراج إنڤست</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:'Segoe UI',Tahoma,Arial,sans-serif;
      background:#061527;color:#cdd5e0;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      text-align:center;padding:24px;
    }
    .wrap{max-width:420px}
    .mark{
      width:72px;height:72px;border-radius:20px;margin:0 auto 24px;
      background:linear-gradient(135deg,#D6A348,#B7791F);
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 14px 32px rgba(0,0,0,.3);
    }
    .mark svg{width:38px;height:38px}
    h1{color:#fff;font-size:22px;font-weight:900;margin-bottom:12px}
    p{font-size:15px;line-height:1.8;color:#9fb0c4;margin-bottom:28px}
    button{
      background:linear-gradient(135deg,#D6A348,#B7791F);color:#08111F;
      border:0;border-radius:14px;padding:14px 28px;font-size:16px;font-weight:800;
      cursor:pointer;font-family:inherit;
    }
    button:active{transform:translateY(1px)}
    .hint{margin-top:20px;font-size:13px;color:#6b7c91}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="#08111F" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 17l6-6 4 4 8-8"/><path d="M17 7h4v4"/>
      </svg>
    </div>
    <h1>لا يوجد اتصال بالإنترنت</h1>
    <p>يبدو أنك غير متصل حاليًا. تحقّق من اتصالك ثم أعد المحاولة لتصفح الفرص في حراج إنڤست.</p>
    <button onclick="location.reload()">إعادة المحاولة</button>
    <div class="hint">سيُعاد تحميل الصفحة تلقائيًا عند عودة الاتصال.</div>
  </div>
  <script>
    // إعادة التحميل تلقائيًا عند عودة الاتصال.
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
